<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Home')}"></head>
<body>

    <!-- Header Navigation -->
    <th:block th:replace="~{fragments :: navbar}"></th:block>

    <!-- Main Content Area -->
    <main>
        
        <!-- Hero Banner Carousel -->
        <section class="hero-carousel" id="hero-slider">
            <!-- Dynamic slides will be injected by JavaScript -->
            <div class="hero-slide active">
                <div class="hero-content">
                    <div class="skeleton" style="width: 120px; height: 24px; margin-bottom: 1rem;"></div>
                    <div class="skeleton" style="width: 80%; height: 60px; margin-bottom: 1rem;"></div>
                    <div class="skeleton" style="width: 40%; height: 20px; margin-bottom: 1.5rem;"></div>
                    <div class="skeleton" style="width: 100%; height: 80px; margin-bottom: 2rem;"></div>
                    <div style="display: flex; gap: 1rem;">
                        <div class="skeleton" style="width: 150px; height: 48px; border-radius: 12px;"></div>
                        <div class="skeleton" style="width: 150px; height: 48px; border-radius: 12px;"></div>
                    </div>
                </div>
            </div>
            
            <!-- Indicator Dots -->
            <div class="carousel-indicators" id="hero-indicators"></div>
        </section>

        <!-- Continue Watching Section (Conditional rendering via JS) -->
        <section class="section-container" id="continue-watching-section" style="display: none;">
            <h2 class="section-title">Continue Watching</h2>
            <div class="carousel-wrapper">
                <button class="carousel-arrow carousel-arrow-left" aria-label="Scroll Left" onclick="scrollRail('continue-rail', -1)">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="carousel-rail" id="continue-rail">
                    <!-- Continue watching cards injected here -->
                </div>
                <button class="carousel-arrow carousel-arrow-right" aria-label="Scroll Right" onclick="scrollRail('continue-rail', 1)">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </section>

        <!-- Recently Viewed Section (Conditional rendering via JS) -->
        <section class="section-container" id="recently-viewed-section" style="display: none;">
            <h2 class="section-title">Recently Viewed</h2>
            <div class="carousel-wrapper">
                <button class="carousel-arrow carousel-arrow-left" aria-label="Scroll Left" onclick="scrollRail('recently-viewed-rail', -1)">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="carousel-rail" id="recently-viewed-rail">
                    <!-- Recently viewed cards injected here -->
                </div>
                <button class="carousel-arrow carousel-arrow-right" aria-label="Scroll Right" onclick="scrollRail('recently-viewed-rail', 1)">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </section>

        <!-- Trending Now Row -->
        <section class="section-container">
            <h2 class="section-title">Trending Now <a href="/movies">See All</a></h2>
            <div class="carousel-wrapper">
                <button class="carousel-arrow carousel-arrow-left" aria-label="Scroll Left" onclick="scrollRail('trending-rail', -1)">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="carousel-rail" id="trending-rail">
                    <!-- Skeletons before AJAX load -->
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                </div>
                <button class="carousel-arrow carousel-arrow-right" aria-label="Scroll Right" onclick="scrollRail('trending-rail', 1)">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </section>

        <!-- Popular Movies Row -->
        <section class="section-container">
            <h2 class="section-title">Popular Movies <a href="/movies">See All</a></h2>
            <div class="carousel-wrapper">
                <button class="carousel-arrow carousel-arrow-left" aria-label="Scroll Left" onclick="scrollRail('popular-movies-rail', -1)">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="carousel-rail" id="popular-movies-rail">
                    <!-- Skeletons before AJAX load -->
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                </div>
                <button class="carousel-arrow carousel-arrow-right" aria-label="Scroll Right" onclick="scrollRail('popular-movies-rail', 1)">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </section>

        <!-- Popular TV Shows Row -->
        <section class="section-container">
            <h2 class="section-title">Popular TV Shows <a href="/tv-shows">See All</a></h2>
            <div class="carousel-wrapper">
                <button class="carousel-arrow carousel-arrow-left" aria-label="Scroll Left" onclick="scrollRail('popular-shows-rail', -1)">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div class="carousel-rail" id="popular-shows-rail">
                    <!-- Skeletons before AJAX load -->
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                </div>
                <button class="carousel-arrow carousel-arrow-right" aria-label="Scroll Right" onclick="scrollRail('popular-shows-rail', 1)">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </section>

    </main>

    <!-- YouTube Trailer Modal -->
    <th:block th:replace="~{fragments :: trailer_modal}"></th:block>

    <!-- Footer -->
    <th:block th:replace="~{fragments :: footer}"></th:block>

    <!-- Core Scripts -->
    <th:block th:replace="~{fragments :: scripts}"></th:block>
    
    <!-- Page Specific Script -->
    <script src="/js/pages.js"></script>
    <script>
        // Init home content on page load
        document.addEventListener('DOMContentLoaded', () => {
            renderHomePage();
        });

        // Helper scroll function for carousel arrows
        function scrollRail(railId, direction) {
            const rail = document.getElementById(railId);
            if (rail) {
                const scrollAmount = rail.clientWidth * 0.8;
                rail.scrollBy({
                    left: direction * scrollAmount,
                    behavior: 'smooth'
                });
            }
        }
    </script>
</body>
</html>
