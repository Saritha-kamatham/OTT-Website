<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('My List')}"></head>
<body>

    <!-- Header Navigation -->
    <th:block th:replace="~{fragments :: navbar}"></th:block>

    <!-- Main Grid Content -->
    <main class="section-container">
        
        <div class="page-header">
            <h1 class="page-title">My Wishlist</h1>
            <p style="color: var(--text-secondary);">Your saved movies and shows to watch later. Saved directly in your browser.</p>
        </div>

        <!-- Wishlist Grid -->
        <div class="movie-grid" id="wishlist-grid">
            <!-- Skeletons shown initially -->
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
        </div>

    </main>

    <!-- YouTube Trailer Modal -->
    <th:block th:replace="~{fragments :: trailer_modal}"></th:block>

    <!-- Footer -->
    <th:block th:replace="~{fragments :: footer}"></th:block>

    <!-- Core Scripts -->
    <th:block th:replace="~{fragments :: scripts}"></th:block>
    
    <!-- Page Specific Script -->
    <script src="/js/pages.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderWatchlistPage();
        });
    </script>
</body>
</html>
